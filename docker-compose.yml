version: '3.8'

services:
  deeprun:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://deeprun:${POSTGRES_PASSWORD:-deeprun}@postgres:5432/deeprun
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEEPRUN_DEFAULT_PROVIDER=${DEEPRUN_DEFAULT_PROVIDER:-openai}
      - METRICS_ENABLED=${METRICS_ENABLED:-true}
      - METRICS_AUTH_TOKEN=${METRICS_AUTH_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - deeprun_data:/app/.data
      - deeprun_workspace:/app/.workspace
      - deeprun_artifacts:/app/.deeprun
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=deeprun
      - POSTGRES_USER=deeprun
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-deeprun}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deeprun -d deeprun"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  deeprun_data:
  deeprun_workspace:
  deeprun_artifacts: